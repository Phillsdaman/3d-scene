<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie Camera 3D Mesh Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border: 2px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        p { margin: 0; font-size: 12px; opacity: 0.8; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 20;
            text-align: center;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">Initializing Native AI Tracking...</div>
    <div id="ui-overlay">
        <h1>Selfie 3D Matrix</h1>
        <p>Drag to rotate scene | Pinch/Scroll to zoom</p>
    </div>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <div id="container"></div>

    <script>
        const video = document.getElementById('webcam');
        const container = document.getElementById('container');
        const loadingDiv = document.getElementById('loading');
        
        let scene, camera, renderer, controls;
        let particleGeometry;
        const MAX_POINTS = 468; // Core MediaPipe structural landmarks
        
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for mobile performance
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(MAX_POINTS * 3);
            const colors = new Float32Array(MAX_POINTS * 3);

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 2.0,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            const gridHelper = new THREE.GridHelper(300, 20, 0x333333, 0x111111);
            gridHelper.position.y = -80;
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);
        }

        // Fired every time MediaPipe processes a camera frame
        function onResults(results) {
            if (loadingDiv.style.display !== 'none') {
                loadingDiv.style.display = 'none';
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const positions = particleGeometry.attributes.position.array;
                const colors = particleGeometry.attributes.color.array;

                for (let i = 0; i < MAX_POINTS; i++) {
                    const pt = landmarks[i];
                    
                    // Convert normalized coordinates (0.0 to 1.0) to centered spatial 3D units
                    const x = (pt.x - 0.5) * -150; 
                    const y = -(pt.y - 0.5) * 150; 
                    const z = pt.z * -200; // Z depth scaling

                    const idx = i * 3;
                    positions[idx] = x;
                    positions[idx + 1] = y;
                    positions[idx + 2] = z;

                    // Compute dynamic cyber-green/cyan styling based on topological depth
                    colors[idx] = 0.0;                              // Red
                    colors[idx + 1] = Math.min(1.0, 0.5 + (pt.z * -3)); // Green
                    colors[idx + 2] = Math.min(1.0, 0.9 + (pt.z * -2)); // Blue
                }
                
                particleGeometry.attributes.position.needsUpdate = true;
                particleGeometry.attributes.color.needsUpdate = true;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        async function main() {
            initThree();
            animate();

            // Set up native MediaPipe pipeline
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: false, // Turned off for raw mobile speed optimization
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults(onResults);

            // Directly link webcam hardware stream tracking loop
            const cameraUtils = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({ image: video });
                },
                width: 640,
                height: 480
            });
            
            cameraUtils.start();
        }

        main();
    </script>
</body>
</html>
