<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie Camera 3D Mesh Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border: 2px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1); /* Mirror feedback for intuitive selfie view */
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        p { margin: 0; font-size: 12px; opacity: 0.8; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 20;
        }
    </style>

    <!-- Three.js for 3D Rendering & OrbitControls for scene navigation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Google MediaPipe for real-time local ML Face Mesh tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
</head>
<body>

    <div id="loading">Initializing Camera & AI Models...</div>
    <div id="ui-overlay">
        <h1>Selfie 3D Matrix</h1>
        <p>Drag to rotate scene | Pinch/Scroll to zoom</p>
    </div>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <div id="container"></div>

    <script>
        const video = document.getElementById('webcam');
        const container = document.getElementById('container');
        const loadingDiv = document.getElementById('loading');
        
        let scene, camera, renderer, controls;
        let detector;
        let particleGeometry;
        let particleSystem;
        const MAX_POINTS = 478; // MediaPipe Face Mesh point count
        
        // Initialize 3D Environment
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Generate a point cloud buffer allocation for the face geometry
            particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(MAX_POINTS * 3);
            const colors = new Float32Array(MAX_POINTS * 3);

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Tech-themed glowing particle shader/material
            const particleMaterial = new THREE.PointsMaterial({
                size: 2.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            // Add subtle grid background to emphasize depth space
            const gridHelper = new THREE.GridHelper(300, 30, 0x444444, 0x222222);
            gridHelper.position.y = -100;
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);
        }

        // Access the user front-facing camera
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => { resolve(video); };
                });
            } catch (e) {
                alert("Camera access denied or unavailable: " + e.message);
            }
        }

        // Initialize TensorFlow Face Landmarker Model
        async function loadModel() {
            const model = tf.data.MediaPipeFaceMesh;
            detector = await faceLandmarksDetection.createDetector(
                faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh, 
                { runtime: 'tfjs', refineLandmarks: true }
            );
        }

        // Main Tracking & Render Frame loop
        async function renderLoop() {
            if (video.readyState >= 2) {
                const faces = await detector.estimateFaces(video, { flipHorizontal: true });
                
                if (faces.length > 0) {
                    loadingDiv.style.display = 'none';
                    const keypoints = faces[0].keypoints;
                    
                    const positions = particleGeometry.attributes.position.array;
                    const colors = particleGeometry.attributes.color.array;

                    // Dynamically map real-world 2D screen coordinates + estimated 3D Z depth 
                    for (let i = 0; i < keypoints.length; i++) {
                        const pt = keypoints[i];
                        
                        // Centering coordinates into the 3D local scene frame
                        const x = pt.x - 320; 
                        const y = -(pt.y - 240); 
                        const z = -pt.z * 2.5; // Exaggerate depth translation for explicit visual feedback

                        const idx = i * 3;
                        positions[idx] = x;
                        positions[idx + 1] = y;
                        positions[idx + 2] = z;

                        // Procedural geometric gradient coloration mapped by depth layers
                        colors[idx] = 0.1;                               // Red
                        colors[idx + 1] = Math.min(1.0, 0.4 + (z / -100)); // Green 
                        colors[idx + 2] = Math.min(1.0, 0.8 + (z / -50));  // Blue
                    }
                    
                    particleGeometry.attributes.position.needsUpdate = true;
                    particleGeometry.attributes.color.needsUpdate = true;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Entry orchestration entrypoint
        async function main() {
            initThree();
            await setupCamera();
            await loadModel();
            renderLoop();
        }

        main();
    </script>
</body>
</html>
