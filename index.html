<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure JS 3D Camera Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0b1a; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #video-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 100px; height: 75px; border: 2px solid #00ffcc;
            border-radius: 6px; overflow: hidden; transform: scaleX(-1); z-index: 10;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 16px; color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
        p { margin: 5px 0 0 0; font-size: 11px; opacity: 0.7; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-overlay">
        <h1>3D Depth Video Matrix</h1>
        <p>Analyzing frame luminance vectors in real-time</p>
    </div>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <div id="container"></div>

    <canvas id="processingCanvas" style="display:none;" width="64" height="48"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('processingCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        
        let scene, camera, renderer;
        let particleGeometry;
        const COLS = 64;
        const ROWS = 48;
        const NUM_POINTS = COLS * ROWS;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Construct structural depth grid
            particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(NUM_POINTS * 3);
            const colors = new Float32Array(NUM_POINTS * 3);

            let i = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const idx = i * 3;
                    // Center the matrix rows and columns
                    positions[idx] = (c - COLS / 2) * 1.5; 
                    positions[idx + 1] = -(r - ROWS / 2) * 1.5;
                    positions[idx + 2] = 0;

                    colors[idx] = 0.0;
                    colors[idx + 1] = 1.0;
                    colors[idx + 2] = 0.8;
                    i++;
                }
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.9
            });

            const mesh = new THREE.Points(particleGeometry, mat);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: 320, height: 240 },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera error: ", err);
            }
        }

        // Processing loop: Extract pixel luminance map as simulated depth topology
        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Downsample live webcam stream onto our matrix processing canvas
                ctx.drawImage(video, 0, 0, COLS, ROWS);
                const imgData = ctx.getImageData(0, 0, COLS, ROWS).data;
                
                const positions = particleGeometry.attributes.position.array;
                const colors = particleGeometry.attributes.color.array;

                for (let i = 0; i < NUM_POINTS; i++) {
                    const pixelIdx = i * 4;
                    const r = imgData[pixelIdx];
                    const g = imgData[pixelIdx + 1];
                    const b = imgData[pixelIdx + 2];

                    // Standard relative luminance formula (brightness calculation)
                    const brightness = (0.2126 * r + 0.7152 * g + 0.0722 * b);
                    
                    // Push brighter objects forward (simulating depth reflection coordinates)
                    const posIdx = i * 3;
                    positions[posIdx + 2] = (brightness / 255) * 18; 

                    // Set glowing neon color scheme mapping 
                    colors[posIdx] = r / 255;
                    colors[posIdx + 1] = (brightness / 255) * 0.9 + 0.1;
                    colors[posIdx + 2] = 1.0;
                }
                particleGeometry.attributes.position.needsUpdate = true;
                particleGeometry.attributes.color.needsUpdate = true;
            }

            // Slowly rotate scene automatically for viewing structural relief
            scene.rotation.y = Math.sin(Date.now() * 0.0005) * 0.4;
            scene.rotation.x = Math.cos(Date.now() * 0.0003) * 0.1;

            renderer.render(scene, camera);
            requestAnimationFrame(processFrame);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function main() {
            init3D();
            await startCamera();
            processFrame();
        }

        main();
    </script>
</body>
</html>
